<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointment Ledger</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
/* ===================================================================
   Appointment Ledger — design tokens
   Concept: a bound clinic ledger, split down the spine into the
   morning round (sunrise) and the evening round (dusk).
=================================================================== */

:root {
  --paper: #f6f3ee;
  --paper-raised: #ffffff;
  --ink: #1f2a24;
  --ink-soft: #5b665f;
  --line: #ddd6c9;

  --teal: #1b6b5c;
  --teal-dark: #124a3f;

  --sunrise-1: #f0a868;
  --sunrise-2: #f7d08a;
  --sunrise-ink: #7a4a17;

  --dusk-1: #2b3a67;
  --dusk-2: #5c4b8a;
  --dusk-ink: #e7e2f5;

  --danger: #c1483b;
  --danger-dark: #8f3128;

  --radius: 10px;
  --shadow: 0 1px 2px rgba(31, 42, 36, 0.06), 0 6px 20px rgba(31, 42, 36, 0.05);

  --font-display: "Fraunces", "Iowan Old Style", serif;
  --font-body: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: "IBM Plex Mono", ui-monospace, SFMono-Regular, monospace;
}

* {
  box-sizing: border-box;
}

@media (prefers-reduced-motion: reduce) {
  * {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
}

html, body {
  margin: 0;
  padding: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
}

#root {
  min-height: 100vh;
}

.app {
  max-width: 1180px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

/* ---------------- Header ---------------- */

.app-header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 28px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--line);
  flex-wrap: wrap;
}

.brand-mark {
  display: flex;
  align-items: center;
  gap: 14px;
}

.brand-mark .glyph {
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--sunrise-2) 0%, var(--sunrise-1) 45%, var(--dusk-2) 55%, var(--dusk-1) 100%);
  flex-shrink: 0;
}

.app-header h1 {
  font-family: var(--font-display);
  font-weight: 600;
  font-size: 2rem;
  margin: 0;
  letter-spacing: -0.01em;
}

.app-header .tagline {
  margin: 2px 0 0;
  color: var(--ink-soft);
  font-size: 0.92rem;
}

.header-stats {
  display: flex;
  gap: 28px;
  font-family: var(--font-mono);
}

.header-stats .stat {
  text-align: right;
}

.header-stats .stat .num {
  display: block;
  font-size: 1.6rem;
  line-height: 1.1;
  font-weight: 600;
}

.header-stats .stat.morning .num { color: var(--sunrise-ink); }
.header-stats .stat.evening .num { color: var(--dusk-1); }

.header-stats .stat .label {
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-soft);
}

/* ---------------- Toolbar: search + new entry ---------------- */

.toolbar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1 1 260px;
  position: relative;
}

.search-box input {
  width: 100%;
}

.search-box .clear-btn {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--ink-soft);
  cursor: pointer;
  font-size: 0.85rem;
  padding: 4px 6px;
}

.btn {
  font-family: var(--font-body);
  font-size: 0.92rem;
  font-weight: 600;
  border-radius: 8px;
  border: 1px solid transparent;
  padding: 11px 18px;
  cursor: pointer;
  transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.12s ease;
}

.btn:active {
  transform: translateY(1px);
}

.btn-primary {
  background: var(--teal);
  color: #fdfdfb;
}
.btn-primary:hover {
  background: var(--teal-dark);
}

.btn-ghost {
  background: var(--paper-raised);
  color: var(--ink);
  border-color: var(--line);
}
.btn-ghost:hover {
  border-color: var(--ink-soft);
}

.btn-danger-outline {
  background: transparent;
  color: var(--danger);
  border-color: rgba(193, 72, 59, 0.35);
  padding: 6px 10px;
  font-size: 0.78rem;
}
.btn-danger-outline:hover {
  background: rgba(193, 72, 59, 0.08);
  border-color: var(--danger);
}

input[type="text"],
input[type="date"],
input[type="time"] {
  font-family: var(--font-body);
  font-size: 0.94rem;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid var(--line);
  background: var(--paper-raised);
  color: var(--ink);
  outline: none;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}

input:focus-visible {
  border-color: var(--teal);
  box-shadow: 0 0 0 3px rgba(27, 107, 92, 0.15);
}

/* ---------------- New entry form (collapsible card) ---------------- */

.entry-form {
  background: var(--paper-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 20px;
  margin-bottom: 28px;
  animation: reveal 0.18s ease;
}

@keyframes reveal {
  from { opacity: 0; transform: translateY(-6px); }
  to { opacity: 1; transform: translateY(0); }
}

.entry-form h2 {
  font-family: var(--font-display);
  font-size: 1.2rem;
  margin: 0 0 16px;
  font-weight: 600;
}

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
}

.field label {
  display: block;
  font-size: 0.74rem;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-soft);
  margin-bottom: 6px;
}

.field input {
  width: 100%;
}

.session-toggle {
  display: flex;
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
}

.session-toggle button {
  flex: 1;
  border: none;
  background: var(--paper-raised);
  padding: 10px 8px;
  font-family: var(--font-body);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
  color: var(--ink-soft);
  transition: background 0.15s ease, color 0.15s ease;
}

.session-toggle button.active.morning {
  background: linear-gradient(135deg, var(--sunrise-2), var(--sunrise-1));
  color: var(--sunrise-ink);
}
.session-toggle button.active.evening {
  background: linear-gradient(135deg, var(--dusk-2), var(--dusk-1));
  color: var(--dusk-ink);
}

.form-actions {
  display: flex;
  justify-content: flex-end;
  gap: 10px;
  margin-top: 18px;
}

.form-error {
  color: var(--danger-dark);
  font-size: 0.85rem;
  margin: 10px 0 0;
}

.form-success {
  color: var(--teal-dark);
  font-size: 0.85rem;
  margin: 10px 0 0;
}

/* ---------------- Ledger spine layout ---------------- */

.ledger {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0;
  align-items: start;
}

.ledger .spine {
  width: 1px;
  align-self: stretch;
  background-image: linear-gradient(to bottom, var(--line) 60%, transparent 0%);
  background-size: 1px 12px;
  background-repeat: repeat-y;
  margin: 8px 28px 0;
}

.round {
  min-width: 0;
}

.round-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}

.round-header .dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.round.morning .dot {
  background: linear-gradient(135deg, var(--sunrise-2), var(--sunrise-1));
}
.round.evening .dot {
  background: linear-gradient(135deg, var(--dusk-2), var(--dusk-1));
}

.round-header h2 {
  font-family: var(--font-display);
  font-size: 1.25rem;
  font-weight: 600;
  margin: 0;
}

.round-header .count {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--ink-soft);
  margin-left: auto;
}

.card-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.appt-card {
  position: relative;
  display: flex;
  gap: 14px;
  background: var(--paper-raised);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 14px 16px 14px 0;
  overflow: hidden;
  animation: reveal 0.18s ease;
}

.appt-card .tab {
  width: 6px;
  flex-shrink: 0;
  border-radius: 6px 0 0 6px;
}

.round.morning .appt-card .tab {
  background: linear-gradient(180deg, var(--sunrise-1), var(--sunrise-2));
}
.round.evening .appt-card .tab {
  background: linear-gradient(180deg, var(--dusk-1), var(--dusk-2));
}

.appt-card .body {
  flex: 1;
  min-width: 0;
}

.appt-card .top-row {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  gap: 10px;
}

.appt-card .patient {
  font-weight: 600;
  font-size: 1rem;
}

.appt-card .time {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--ink-soft);
  white-space: nowrap;
}

.appt-card .meta {
  margin-top: 4px;
  font-size: 0.85rem;
  color: var(--ink-soft);
}

.appt-card .meta .id-tag {
  font-family: var(--font-mono);
  font-size: 0.72rem;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 5px;
  padding: 1px 6px;
  margin-right: 8px;
}

.appt-card .bottom-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
}

.empty-state {
  border: 1px dashed var(--line);
  border-radius: var(--radius);
  padding: 28px 16px;
  text-align: center;
  color: var(--ink-soft);
  font-size: 0.9rem;
}

/* ---------------- Toast / banner ---------------- */

.banner {
  position: fixed;
  bottom: 22px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--paper);
  padding: 12px 20px;
  border-radius: 999px;
  font-size: 0.88rem;
  box-shadow: var(--shadow);
  z-index: 40;
  animation: rise 0.2s ease;
}

.banner.error {
  background: var(--danger-dark);
}

@keyframes rise {
  from { opacity: 0; transform: translate(-50%, 10px); }
  to { opacity: 1; transform: translate(-50%, 0); }
}

.offline-note {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--danger-dark);
  background: rgba(193, 72, 59, 0.08);
  border: 1px solid rgba(193, 72, 59, 0.25);
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 20px;
}

/* ---------------- Responsive ---------------- */

@media (max-width: 860px) {
  .ledger {
    grid-template-columns: 1fr;
  }
  .ledger .spine {
    width: auto;
    height: 1px;
    background-image: linear-gradient(to right, var(--line) 60%, transparent 0%);
    background-size: 12px 1px;
    margin: 24px 0;
  }
  .header-stats {
    gap: 18px;
  }
}

@media (max-width: 520px) {
  .app {
    padding: 24px 16px 60px;
  }
  .app-header h1 {
    font-size: 1.5rem;
  }
  .form-actions {
    justify-content: stretch;
  }
  .form-actions .btn {
    flex: 1;
  }
}

  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React (development builds are fine for local/demo use) -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <!-- Babel standalone lets the browser run JSX directly, no build step needed -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
const { useState, useEffect, useCallback } = React;

// Point this at wherever the Flask API is running.
// NOTE: if this page is deployed (e.g. GitHub Pages) and the API is only
// running on your own computer at 127.0.0.1, no visitor's browser but yours
// can reach it. Deploy the Flask API somewhere public (Render, Railway, etc.)
// and put that URL here instead.
const API_BASE = "http://127.0.0.1:5000";

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  if (isNaN(d.getTime())) return dateStr;
  return d.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" });
}

function formatTime(timeStr) {
  if (!timeStr) return "";
  const [h, m] = timeStr.split(":");
  if (h === undefined) return timeStr;
  const hour = parseInt(h, 10);
  const period = hour >= 12 ? "PM" : "AM";
  const hour12 = hour % 12 === 0 ? 12 : hour % 12;
  return `${hour12}:${m ?? "00"} ${period}`;
}

function emptyForm() {
  return {
    appointment_id: "",
    patient_name: "",
    doctor_name: "",
    date: "",
    time: "",
    session: "morning",
  };
}

function AppointmentCard({ appt, onDelete }) {
  return (
    <div className="appt-card">
      <div className="tab" />
      <div className="body">
        <div className="top-row">
          <span className="patient">{appt.patient_name}</span>
          <span className="time">{formatTime(appt.time)}</span>
        </div>
        <div className="meta">
          <span className="id-tag">#{appt.appointment_id}</span>
          Dr. {appt.doctor_name} · {formatDate(appt.date)}
        </div>
        <div className="bottom-row">
          <span />
          <button className="btn btn-danger-outline" onClick={() => onDelete(appt.appointment_id)}>
            Remove
          </button>
        </div>
      </div>
    </div>
  );
}

function Round({ session, title, appointments, onDelete }) {
  return (
    <div className={`round ${session}`}>
      <div className="round-header">
        <span className="dot" />
        <h2>{title}</h2>
        <span className="count">{appointments.length} booked</span>
      </div>
      <div className="card-list">
        {appointments.length === 0 && (
          <div className="empty-state">No {session} appointments yet.</div>
        )}
        {appointments.map((a) => (
          <AppointmentCard key={a.appointment_id} appt={a} onDelete={onDelete} />
        ))}
      </div>
    </div>
  );
}

function App() {
  const [morning, setMorning] = useState([]);
  const [evening, setEvening] = useState([]);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState(emptyForm());
  const [formError, setFormError] = useState("");
  const [search, setSearch] = useState("");
  const [searchResult, setSearchResult] = useState(null);
  const [searchError, setSearchError] = useState("");
  const [banner, setBanner] = useState(null); // { text, error }
  const [offline, setOffline] = useState(false);

  const showBanner = (text, error = false) => {
    setBanner({ text, error });
    setTimeout(() => setBanner(null), 2600);
  };

  const loadAppointments = useCallback(async () => {
    try {
      const res = await fetch(`${API_BASE}/appointments`);
      if (!res.ok) throw new Error("bad response");
      const data = await res.json();
      setMorning(data.morning || []);
      setEvening(data.evening || []);
      setOffline(false);
    } catch (err) {
      setOffline(true);
    }
  }, []);

  useEffect(() => {
    loadAppointments();
  }, [loadAppointments]);

  const handleFieldChange = (field) => (e) => {
    setForm((f) => ({ ...f, [field]: e.target.value }));
  };

  const handleSessionPick = (session) => {
    setForm((f) => ({ ...f, session }));
  };

  const resetForm = () => {
    setForm(emptyForm());
    setFormError("");
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setFormError("");

    const required = ["appointment_id", "patient_name", "doctor_name", "date", "time"];
    const missing = required.filter((f) => !form[f].trim());
    if (missing.length) {
      setFormError(`Please fill in: ${missing.join(", ").replace(/_/g, " ")}`);
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/appointments`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(form),
      });
      const data = await res.json();
      if (!res.ok) {
        setFormError(data.message || "Could not add appointment");
        return;
      }
      showBanner(`Added ${form.patient_name}'s appointment`);
      resetForm();
      setShowForm(false);
      loadAppointments();
    } catch (err) {
      setFormError("Couldn't reach the server. Is the Flask app running?");
    }
  };

  const handleDelete = async (id) => {
    try {
      const res = await fetch(`${API_BASE}/appointments/${id}`, { method: "DELETE" });
      if (!res.ok) {
        showBanner("Could not delete appointment", true);
        return;
      }
      showBanner("Appointment removed");
      if (searchResult && searchResult.appointment_id === id) setSearchResult(null);
      loadAppointments();
    } catch (err) {
      showBanner("Couldn't reach the server", true);
    }
  };

  const handleSearch = async (e) => {
    e.preventDefault();
    setSearchError("");
    setSearchResult(null);
    if (!search.trim()) return;
    try {
      const res = await fetch(`${API_BASE}/appointments/${encodeURIComponent(search.trim())}`);
      if (res.status === 404) {
        setSearchError(`No appointment found with ID "${search.trim()}"`);
        return;
      }
      const data = await res.json();
      setSearchResult(data);
    } catch (err) {
      setSearchError("Couldn't reach the server. Is the Flask app running?");
    }
  };

  const clearSearch = () => {
    setSearch("");
    setSearchResult(null);
    setSearchError("");
  };

  return (
    <div className="app">
      <header className="app-header">
        <div className="brand-mark">
          <span className="glyph" aria-hidden="true" />
          <div>
            <h1>Appointment Ledger</h1>
            <p className="tagline">One book, two rounds: morning and evening.</p>
          </div>
        </div>
        <div className="header-stats">
          <div className="stat morning">
            <span className="num">{morning.length}</span>
            <span className="label">Morning</span>
          </div>
          <div className="stat evening">
            <span className="num">{evening.length}</span>
            <span className="label">Evening</span>
          </div>
        </div>
      </header>

      {offline && (
        <p className="offline-note">
          Can't reach the API at {API_BASE}. Start the Flask server (python app.py) and refresh.
        </p>
      )}

      <div className="toolbar">
        <form className="search-box" onSubmit={handleSearch}>
          <input
            type="text"
            placeholder="Find an appointment by ID…"
            value={search}
            onChange={(e) => setSearch(e.target.value)}
          />
          {search && (
            <button type="button" className="clear-btn" onClick={clearSearch}>
              ✕
            </button>
          )}
        </form>
        <button className="btn btn-ghost" onClick={handleSearch}>
          Search
        </button>
        <button
          className="btn btn-primary"
          onClick={() => {
            setShowForm((s) => !s);
            setFormError("");
          }}
        >
          {showForm ? "Cancel" : "+ New appointment"}
        </button>
      </div>

      {searchError && <p className="form-error" style={{ marginBottom: 16 }}>{searchError}</p>}

      {searchResult && (
        <div className="entry-form" style={{ marginBottom: 20 }}>
          <h2>Search result</h2>
          <AppointmentCard appt={searchResult} onDelete={handleDelete} />
        </div>
      )}

      {showForm && (
        <form className="entry-form" onSubmit={handleSubmit}>
          <h2>New appointment</h2>
          <div className="form-grid">
            <div className="field">
              <label htmlFor="appointment_id">Appointment ID</label>
              <input
                id="appointment_id"
                type="text"
                value={form.appointment_id}
                onChange={handleFieldChange("appointment_id")}
                placeholder="e.g. A-1042"
              />
            </div>
            <div className="field">
              <label htmlFor="patient_name">Patient name</label>
              <input
                id="patient_name"
                type="text"
                value={form.patient_name}
                onChange={handleFieldChange("patient_name")}
                placeholder="e.g. Asha Patil"
              />
            </div>
            <div className="field">
              <label htmlFor="doctor_name">Doctor</label>
              <input
                id="doctor_name"
                type="text"
                value={form.doctor_name}
                onChange={handleFieldChange("doctor_name")}
                placeholder="e.g. Rao"
              />
            </div>
            <div className="field">
              <label htmlFor="date">Date</label>
              <input id="date" type="date" value={form.date} onChange={handleFieldChange("date")} />
            </div>
            <div className="field">
              <label htmlFor="time">Time</label>
              <input id="time" type="time" value={form.time} onChange={handleFieldChange("time")} />
            </div>
            <div className="field">
              <label>Round</label>
              <div className="session-toggle">
                <button
                  type="button"
                  className={`morning ${form.session === "morning" ? "active" : ""}`}
                  onClick={() => handleSessionPick("morning")}
                >
                  ☀ Morning
                </button>
                <button
                  type="button"
                  className={`evening ${form.session === "evening" ? "active" : ""}`}
                  onClick={() => handleSessionPick("evening")}
                >
                  ☾ Evening
                </button>
              </div>
            </div>
          </div>
          {formError && <p className="form-error">{formError}</p>}
          <div className="form-actions">
            <button type="button" className="btn btn-ghost" onClick={resetForm}>
              Clear
            </button>
            <button type="submit" className="btn btn-primary">
              Save appointment
            </button>
          </div>
        </form>
      )}

      <div className="ledger">
        <Round session="morning" title="Morning Round" appointments={morning} onDelete={handleDelete} />
        <div className="spine" aria-hidden="true" />
        <Round session="evening" title="Evening Round" appointments={evening} onDelete={handleDelete} />
      </div>

      {banner && <div className={`banner ${banner.error ? "error" : ""}`}>{banner.text}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

  </script>
</body>
</html>
